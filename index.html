<!-- JH Electrical Services Inc — Estimate Tool -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

  :root {
    --cream: #F5F1E8;
    --paper: #FFFFFF;
    --ink: #1A2456;
    --ink-soft: #4A5278;
    --ink-muted: #8A8FA8;
    --rule: #E0DBC8;
    --rule-soft: #EFEAD8;
    --accent: #1A2456;
    --accent-deep: #0F1640;
    --accent-soft: #E8EAF3;
    --gold: #F2B632;
    --gold-soft: #FFF4D6;
    --warn: #8C3B2A;
    --warn-soft: #F1E0DA;
  }

  * { box-sizing: border-box; }

  body, .app-root {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Geist', -apple-system, sans-serif;
    margin: 0;
    padding: 0;
    line-height: 1.5;
    font-size: 14px;
  }

  .app-root { padding: 24px 16px 60px; min-height: 100vh; }
  .container { max-width: 920px; margin: 0 auto; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 14px;
    margin-bottom: 22px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand-block { display: flex; align-items: center; gap: 14px; }
  .brand-logo { height: 56px; width: auto; }
  .brand-info { display: flex; flex-direction: column; }
  .brand-name {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--accent-deep);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .brand-license {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 4px;
  }
  .brand-license strong { color: var(--gold); font-weight: 600; }

  .tabs { display: flex; gap: 2px; }
  .tab {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 8px 14px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
  }
  .tab.active {
    background: var(--accent-deep);
    color: var(--paper);
    border-color: var(--accent-deep);
    font-weight: 600;
  }
  .tab:hover:not(.active) { color: var(--accent); border-color: var(--accent); }

  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 18px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: var(--accent-deep);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .card-num {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .card-num.gold { color: var(--gold); font-weight: 600; }

  .row { display: grid; gap: 14px; margin-bottom: 14px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }

  @media (max-width: 640px) {
    .row-2, .row-3 { grid-template-columns: 1fr; }
  }

  label {
    display: block;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 5px;
    font-weight: 500;
  }
  input[type=text], input[type=email], input[type=tel], input[type=number], input[type=date], textarea, select {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 9px 11px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    background: var(--paper);
    box-shadow: 0 0 0 3px var(--gold-soft);
  }
  textarea { resize: vertical; min-height: 70px; font-family: 'Geist', sans-serif; }
  input[readonly] { background: var(--rule-soft); color: var(--ink-soft); }

  .items-head {
    display: grid;
    grid-template-columns: 3fr 1fr 1fr 1fr 32px;
    gap: 14px;
    padding: 0 0 8px 0;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 10px;
  }
  .items-head label { margin-bottom: 0; }
  @media (max-width: 640px) { .items-head { display: none; } }

  .item-row {
    display: grid;
    grid-template-columns: 3fr 1fr 1fr 1fr 32px;
    gap: 14px;
    align-items: center;
    margin-bottom: 8px;
  }
  @media (max-width: 640px) {
    .item-row {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--rule-soft);
      border-radius: 6px;
      margin-bottom: 12px;
    }
  }

  .amount-cell {
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    color: var(--accent-deep);
    padding: 9px 11px;
    background: var(--gold-soft);
    border-radius: 5px;
    text-align: right;
    font-weight: 600;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-muted);
    width: 32px; height: 32px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 16px;
  }
  .icon-btn:hover { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }

  .totals {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: flex-end;
  }
  .totals-box { width: 280px; }
  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
  }
  .total-row span:first-child { color: var(--ink-muted); }
  .total-row.grand {
    border-top: 2px solid var(--gold);
    margin-top: 8px;
    padding-top: 10px;
    font-size: 16px;
    color: var(--accent-deep);
    font-weight: 600;
  }
  .total-row.grand span:first-child { color: var(--accent-deep); font-weight: 600; }

  .btn {
    border: none;
    padding: 10px 18px;
    border-radius: 5px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent-deep); color: var(--paper); }
  .btn-primary:hover { background: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26, 36, 86, 0.3); }
  .btn-gold { background: var(--gold); color: var(--accent-deep); }
  .btn-gold:hover { background: #E0A52E; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(242, 182, 50, 0.4); }
  .btn-ghost { background: transparent; color: var(--accent-deep); border: 1px solid var(--accent-deep); }
  .btn-ghost:hover { background: var(--accent-soft); }
  .btn-warn { background: var(--warn); color: var(--paper); }
  .btn-warn:hover { background: #6F2D20; }

  .btn-add {
    background: transparent;
    border: 1px dashed var(--rule);
    color: var(--ink-muted);
    padding: 9px 14px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
    transition: all 0.15s;
  }
  .btn-add:hover { border-color: var(--gold); color: var(--accent-deep); background: var(--gold-soft); }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 20px;
  }
  .actions-right { display: flex; gap: 8px; flex-wrap: wrap; }

  .terms-group { margin-bottom: 18px; }
  .terms-group:last-child { margin-bottom: 0; }
  .terms-group-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--accent-soft);
    border-left: 3px solid var(--gold);
    border-radius: 0 5px 5px 0;
    margin-bottom: 10px;
  }
  .terms-group-head h3 {
    margin: 0;
    font-family: 'Instrument Serif', serif;
    font-size: 17px;
    color: var(--accent-deep);
    font-style: italic;
  }
  .terms-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .terms-list-electrical { counter-reset: term-e; }
  .terms-list-payment { counter-reset: term-p; }
  .terms-list-lien { counter-reset: term-l; }
  .term-row {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--rule-soft);
    align-items: flex-start;
  }
  .term-row:last-child { border-bottom: none; }
  .term-num {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    flex-shrink: 0;
    padding-top: 9px;
    width: 28px;
    font-weight: 600;
  }
  .terms-list-electrical .term-row .term-num { counter-increment: term-e; }
  .terms-list-electrical .term-row .term-num::before { content: "E" counter(term-e, decimal-leading-zero); }
  .terms-list-payment .term-row .term-num { counter-increment: term-p; }
  .terms-list-payment .term-row .term-num::before { content: "P" counter(term-p, decimal-leading-zero); }
  .terms-list-lien .term-row .term-num { counter-increment: term-l; }
  .terms-list-lien .term-row .term-num::before { content: "L" counter(term-l, decimal-leading-zero); }
  .term-row textarea { flex: 1; min-height: 38px; font-size: 13px; }
  .term-row .read-text { flex: 1; padding: 9px 0; color: var(--ink-soft); font-size: 13px; line-height: 1.55; }

  .share-banner {
    background: linear-gradient(135deg, var(--accent-deep) 0%, var(--accent) 100%);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 18px;
    color: var(--paper);
    border: 2px solid var(--gold);
  }
  .share-banner-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .share-id {
    font-family: 'Geist Mono', monospace;
    font-size: 24px;
    color: var(--paper);
    font-weight: 700;
    letter-spacing: 0.08em;
    user-select: all;
    background: rgba(255,255,255,0.08);
    padding: 8px 16px;
    border-radius: 5px;
    border: 1px dashed var(--gold);
    display: inline-block;
    cursor: pointer;
  }
  .share-banner p { margin: 10px 0 0; font-size: 13px; color: rgba(255,255,255,0.85); }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-muted);
  }
  .empty .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.6; color: var(--gold); }
  .empty h3 { font-family: 'Instrument Serif', serif; color: var(--ink-soft); font-style: italic; margin: 0 0 6px; font-size: 20px; }

  .estimate-list { display: grid; gap: 10px; }
  .estimate-item {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-wrap: wrap;
    gap: 12px;
  }
  .estimate-item:hover { border-color: var(--gold); transform: translateX(2px); box-shadow: -2px 2px 0 var(--gold-soft); }
  .est-meta-left { flex: 1; min-width: 200px; }
  .est-id { font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent-deep); }
  .est-customer { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .est-meta-right { display: flex; align-items: center; gap: 12px; }
  .est-amount { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent-deep); }

  .status-pill {
    font-family: 'Geist Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 12px;
    font-weight: 600;
  }
  .status-draft { background: var(--rule-soft); color: var(--ink-soft); }
  .status-sent { background: var(--gold-soft); color: #8A6800; }
  .status-accepted { background: var(--accent-soft); color: var(--accent-deep); }
  .status-rejected { background: var(--warn-soft); color: var(--warn); }
  .status-partial { background: #FCE6CC; color: #9A4F00; }

  .customer-letterhead {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--gold);
    border-radius: 8px;
    padding: 22px 24px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }
  .letterhead-left { display: flex; align-items: center; gap: 14px; }
  .letterhead-logo { height: 64px; }
  .letterhead-name {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: var(--accent-deep);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .letterhead-contact {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    line-height: 1.7;
  }
  .letterhead-right {
    text-align: right;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .letterhead-est-id {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-deep);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .review-item {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: all 0.15s;
  }
  .review-item.accepted { border-left: 3px solid var(--accent); background: var(--accent-soft); }
  .review-item.rejected { border-left: 3px solid var(--warn); background: var(--warn-soft); }

  .review-item-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .review-item-desc { font-weight: 500; flex: 1; min-width: 200px; color: var(--accent-deep); }
  .review-item-meta {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 4px;
  }
  .review-item-amt { font-family: 'Geist Mono', monospace; font-weight: 600; font-size: 14px; color: var(--accent-deep); }

  .accept-toggle { display: flex; gap: 6px; margin-top: 10px; }
  .toggle-btn {
    flex: 1;
    padding: 8px 12px;
    border-radius: 5px;
    border: 1px solid var(--rule);
    background: var(--cream);
    cursor: pointer;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    transition: all 0.15s;
    font-weight: 500;
  }
  .toggle-btn:hover { background: var(--paper); }
  .toggle-btn.active-accept { background: var(--accent-deep); color: var(--paper); border-color: var(--accent-deep); }
  .toggle-btn.active-reject { background: var(--warn); color: var(--paper); border-color: var(--warn); }

  .reject-reason { margin-top: 8px; }
  .reject-reason input { font-size: 13px; }

  .signature-box {
    background: var(--gold-soft);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 16px;
    margin-top: 14px;
  }

  .read-only-block {
    background: var(--cream);
    border-left: 3px solid var(--gold);
    padding: 12px 14px;
    border-radius: 0 5px 5px 0;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .read-only-block strong { color: var(--accent-deep); display: block; margin-bottom: 4px; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; }

  .submit-resp { text-align: center; padding: 24px 0 0; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent-deep);
    color: var(--paper);
    padding: 12px 22px;
    border-radius: 24px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    transition: transform 0.3s;
    z-index: 1000;
    border: 1px solid var(--gold);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.warn { background: var(--warn); border-color: var(--warn); }

  .id-lookup {
    display: flex;
    gap: 8px;
    max-width: 400px;
    margin: 0 auto;
  }
  .id-lookup input {
    text-transform: uppercase;
    font-family: 'Geist Mono', monospace;
    letter-spacing: 0.05em;
    text-align: center;
    font-size: 16px;
  }

  .response-summary {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 16px;
  }
  .response-summary h4 {
    margin: 0 0 8px;
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--accent-deep);
    font-style: italic;
  }
  .response-summary p { margin: 4px 0; font-size: 13px; color: var(--ink-soft); }

  .hint {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 6px;
    font-style: italic;
  }

  /* ---------- Printable estimate ---------- */
  .print-toolbar {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: var(--gold-soft);
    border: 1px solid var(--gold);
    border-radius: 6px;
    flex-wrap: wrap;
  }
  .print-toolbar p { margin: 0; font-size: 13px; color: var(--ink-soft); }

  .print-sheet {
    background: white;
    padding: 40px 44px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    color: #111;
    font-size: 13px;
    line-height: 1.55;
  }
  .ph-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding-bottom: 18px; border-bottom: 3px solid var(--gold); }
  .ph-head-left { display: flex; gap: 14px; align-items: center; }
  .ph-head img { height: 64px; }
  .ph-co-name { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--accent-deep); margin-bottom: 4px; }
  .ph-co-contact { font-size: 11px; color: #555; line-height: 1.7; }
  .ph-head-right { text-align: right; font-size: 11px; color: #555; }
  .ph-est-title { font-family: 'Instrument Serif', serif; font-size: 26px; color: var(--accent-deep); letter-spacing: -0.01em; margin-bottom: 4px; }
  .ph-est-id { font-family: 'Geist Mono', monospace; font-size: 14px; color: var(--accent-deep); font-weight: 600; letter-spacing: 0.05em; }

  .ph-section { margin-top: 20px; }
  .ph-section h4 {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-deep);
    margin: 0 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--rule);
    font-weight: 600;
  }
  .ph-bill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .ph-bill-grid > div { font-size: 12px; line-height: 1.6; }

  table.ph-items { width: 100%; border-collapse: collapse; margin-top: 6px; }
  table.ph-items th, table.ph-items td { padding: 9px 8px; text-align: left; vertical-align: top; }
  table.ph-items th {
    background: var(--accent-deep); color: white;
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
  }
  table.ph-items th.num, table.ph-items td.num { text-align: right; font-family: 'Geist Mono', monospace; font-variant-numeric: tabular-nums; }
  table.ph-items th.center, table.ph-items td.center { text-align: center; }
  table.ph-items tbody tr { border-bottom: 1px solid var(--rule-soft); }
  table.ph-items tbody tr:nth-child(even) { background: #FBF8F0; }

  .ph-accept-cell { display: flex; gap: 12px; justify-content: center; }
  .ph-checkbox { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .ph-box { width: 14px; height: 14px; border: 1.5px solid #333; display: inline-block; border-radius: 2px; }

  .ph-totals { margin-top: 10px; display: flex; justify-content: flex-end; }
  .ph-totals-box { width: 320px; }
  .ph-totals-row { display: flex; justify-content: space-between; padding: 4px 0; font-family: 'Geist Mono', monospace; font-size: 12px; }
  .ph-totals-row.grand { border-top: 2px solid var(--accent-deep); margin-top: 6px; padding-top: 8px; font-size: 15px; font-weight: 700; color: var(--accent-deep); }

  .ph-terms-section { margin-top: 18px; }
  .ph-terms-section h5 {
    font-family: 'Instrument Serif', serif;
    font-size: 14px;
    color: var(--accent-deep);
    margin: 12px 0 6px;
    font-style: italic;
  }
  .ph-terms-section ol { margin: 0; padding-left: 22px; font-size: 11px; line-height: 1.55; color: #444; }
  .ph-terms-section ol li { margin-bottom: 4px; }

  .ph-signatures {
    margin-top: 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    page-break-inside: avoid;
  }
  .ph-sig-block {
    border-top: 1px solid #333;
    padding-top: 6px;
    font-size: 10px;
    color: #555;
    font-family: 'Geist Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .ph-sig-line { height: 32px; margin-bottom: 4px; }
  .ph-sig-row { display: flex; gap: 20px; margin-top: 14px; }
  .ph-sig-row > div { flex: 1; }

  .ph-notes-block {
    margin-top: 16px;
    padding: 10px 12px;
    background: #FBF8F0;
    border-left: 3px solid var(--gold);
    font-size: 11px;
    line-height: 1.55;
    color: #555;
  }
  .ph-notes-block strong { display: block; font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent-deep); margin-bottom: 4px; font-weight: 600; }

  /* ---------- Print media query ---------- */
  @media print {
    @page { size: letter; margin: 0.4in; }
    body, .app-root { background: white !important; padding: 0 !important; }
    .top-bar, .tabs, .tab, .print-toolbar, .actions { display: none !important; }
    .container { max-width: none; padding: 0; }
    #view-root > *:not(.print-sheet) { display: none !important; }
    .print-sheet { border: none; box-shadow: none; padding: 0; }
    .ph-section, .ph-terms-section, .ph-signatures { page-break-inside: avoid; }
    table.ph-items { page-break-inside: auto; }
    table.ph-items tr { page-break-inside: avoid; }
    .ph-terms-section ol { font-size: 9.5px; }
  }
</style>

    "The customer warrants that they are either the registered owner of the property or have full authority from the owner to authorize the work and to bind the property to a construction lien for unpaid amounts.",
    "All amounts received by JH Electrical Services Inc. from the customer in connection with this project constitute trust funds under sections 7–13 of the Construction Act and shall be applied first to amounts owing to suppliers, workers, and subcontractors associated with this project.",
    "The lien preservation period of sixty (60) days commences on the earliest of the date of substantial performance, completion, termination, or abandonment of the contract, in accordance with section 31 of the Construction Act.",
    "Pursuant to section 6.1 of the Construction Act, an invoice delivered by JH Electrical Services Inc. shall be deemed a 'proper invoice' unless the customer delivers a written notice of deficiency within seven (7) days of receipt, identifying the specific corrections required.",
    "In the event of non-payment, the customer agrees to pay all costs of enforcement and collection — including legal fees, lien preservation and perfection costs, and court costs — on a substantial-indemnity basis.",
    "The customer authorizes JH Electrical Services Inc. to make all reasonable inquiries necessary to identify the registered owner of the property and any mortgagees for the purposes of preserving and enforcing lien rights."
  ];

  let currentView = 'create';
  let activeEstimate = null;
  let customerLookupId = '';
  let pendingResponse = null;

  function newDraft() {
    return {
      id: null,
      status: 'draft',
      createdAt: new Date().toISOString(),
      business: { ...BUSINESS_DEFAULTS },
      customer: { name: '', email: '', phone: '', address: '' },
      project: { title: '', description: '', validUntil: '' },
      currency: '$',
      items: [{ id: uid(), desc: '', qty: 1, rate: 0 }],
      taxRate: 13,
      taxLabel: 'HST',
      notes: '',
      electricalTerms: [...ELECTRICAL_TERMS],
      paymentTerms: [...PAYMENT_TERMS],
      lienTerms: [...LIEN_TERMS],
      customerResponse: null
    };
  }

  function uid() { return Math.random().toString(36).slice(2, 9); }
  function makeShareId() {
    const chars = 'ACDEFGHJKLMNPQRTUVWXY3479';
    let s = '';
    for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return 'EST-' + s;
  }

  // ===================== Storage (hybrid: works inside Claude AND as a downloaded file) =====================
  const STORAGE_PREFIX = 'jh_estimate:';
  const hasClaudeStorage = (() => {
    try { return typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function'; }
    catch (e) { return false; }
  })();

  async function saveEstimate(est) {
    try {
      if (hasClaudeStorage) {
        await window.storage.set('estimate:' + est.id, JSON.stringify(est), true);
      } else {
        localStorage.setItem(STORAGE_PREFIX + est.id, JSON.stringify(est));
      }
      return true;
    } catch (e) {
      console.error(e);
      toast('Save failed: ' + (e.message || e), true);
      return false;
    }
  }
  async function loadEstimate(id) {
    try {
      if (hasClaudeStorage) {
        const r = await window.storage.get('estimate:' + id, true);
        return r ? upgradeEstimate(JSON.parse(r.value)) : null;
      } else {
        const v = localStorage.getItem(STORAGE_PREFIX + id);
        return v ? upgradeEstimate(JSON.parse(v)) : null;
      }
    } catch (e) { console.error(e); return null; }
  }
  async function deleteEstimate(id) {
    try {
      if (hasClaudeStorage) await window.storage.delete('estimate:' + id, true);
      else localStorage.removeItem(STORAGE_PREFIX + id);
      return true;
    } catch (e) { return false; }
  }
  async function listEstimates() {
    try {
      if (hasClaudeStorage) {
        const r = await window.storage.list('estimate:', true);
        if (!r || !r.keys) return [];
        const all = await Promise.all(r.keys.map(async k => {
          try {
            const v = await window.storage.get(k, true);
            return v ? upgradeEstimate(JSON.parse(v.value)) : null;
          } catch (e) { return null; }
        }));
        return all.filter(Boolean).sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      } else {
        const out = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(STORAGE_PREFIX)) {
            try { out.push(upgradeEstimate(JSON.parse(localStorage.getItem(k)))); } catch (e) {}
          }
        }
        return out.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      }
    } catch (e) { return []; }
  }

  function upgradeEstimate(e) {
    if (!e.electricalTerms && Array.isArray(e.terms)) {
      e.electricalTerms = e.terms;
      e.paymentTerms = [];
      delete e.terms;
    }
    if (!e.lienTerms) e.lienTerms = [...LIEN_TERMS];
    if (!e.business.license) e.business.license = BUSINESS_DEFAULTS.license;
    if (!e.business.website) e.business.website = BUSINESS_DEFAULTS.website;
    if (!e.taxLabel) e.taxLabel = 'HST';
    return e;
  }

  function fmt(n, cur = '$') {
    const v = Number(n) || 0;
    return cur + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function calcTotals(est) {
    const sub = est.items.reduce((s, i) => s + (Number(i.qty) || 0) * (Number(i.rate) || 0), 0);
    const tax = sub * ((Number(est.taxRate) || 0) / 100);
    return { sub, tax, total: sub + tax };
  }
  function toast(msg, warn) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('warn', !!warn);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function statusOf(est) {
    if (!est) return 'draft';
    if (est.status === 'draft') return 'draft';
    if (!est.customerResponse) return 'sent';
    const decisions = est.customerResponse.decisions || {};
    const keys = Object.keys(decisions).filter(k => decisions[k]);
    if (keys.length === 0) return 'sent';
    const allReject = keys.every(k => decisions[k] === 'reject');
    const allAccept = keys.every(k => decisions[k] === 'accept');
    if (allAccept) return 'accepted';
    if (allReject) return 'rejected';
    return 'partial';
  }
  function statusLabel(s) {
    return ({ draft: 'Draft', sent: 'Awaiting Reply', accepted: 'Accepted', rejected: 'Rejected', partial: 'Partial' }[s] || s);
  }

  function setView(v) {
    currentView = v;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
    render();
  }
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => setView(t.dataset.view));
  });

  function renderCreate() {
    if (!activeEstimate) activeEstimate = newDraft();
    const e = activeEstimate;
    const t = calcTotals(e);
    const isShared = !!e.id && e.status !== 'draft';

    const root = document.getElementById('view-root');
    root.innerHTML = `
      ${e.id ? `
        <div class="share-banner">
          <div class="share-banner-label">⚡ Estimate ID — share with your customer</div>
          <span class="share-id" id="copy-id" title="Click to copy">${e.id}</span>
          <p>Send this code to your customer. They'll open <strong>Customer View</strong> and enter the ID to review and sign.</p>
        </div>` : ''}

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Your Business</h2>
          <span class="card-num">01 / 05</span>
        </div>
        <div class="row row-2">
          <div><label>Business Name</label><input type="text" data-bind="business.name" value="${escHtml(e.business.name)}"></div>
          <div><label>ECRA/ESA Licence #</label><input type="text" data-bind="business.license" value="${escHtml(e.business.license || '')}"></div>
        </div>
        <div class="row row-2">
          <div><label>Email</label><input type="email" data-bind="business.email" value="${escHtml(e.business.email)}"></div>
          <div><label>Phone</label><input type="tel" data-bind="business.phone" value="${escHtml(e.business.phone)}"></div>
        </div>
        <div class="row row-2">
          <div><label>Address</label><input type="text" data-bind="business.address" value="${escHtml(e.business.address)}"></div>
          <div><label>Website</label><input type="text" data-bind="business.website" value="${escHtml(e.business.website || '')}"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Customer Details</h2>
          <span class="card-num">02 / 05</span>
        </div>
        <div class="row row-2">
          <div><label>Customer Name</label><input type="text" data-bind="customer.name" value="${escHtml(e.customer.name)}" placeholder="Jane Smith"></div>
          <div><label>Email</label><input type="email" data-bind="customer.email" value="${escHtml(e.customer.email)}" placeholder="jane@example.com"></div>
        </div>
        <div class="row row-2">
          <div><label>Phone</label><input type="tel" data-bind="customer.phone" value="${escHtml(e.customer.phone)}"></div>
          <div><label>Site Address</label><input type="text" data-bind="customer.address" value="${escHtml(e.customer.address)}"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Scope of Work</h2>
          <span class="card-num">03 / 05</span>
        </div>
        <div class="row">
          <div><label>Project Title</label><input type="text" data-bind="project.title" value="${escHtml(e.project.title)}" placeholder="Panel Upgrade — 100A to 200A"></div>
        </div>
        <div class="row">
          <div><label>Description / Overview</label><textarea data-bind="project.description" placeholder="Brief overview of the electrical work to be performed.">${escHtml(e.project.description)}</textarea></div>
        </div>
        <div class="row row-3">
          <div><label>Currency</label>
            <select data-bind="currency">
              <option value="$" ${e.currency==='$'?'selected':''}>$ CAD</option>
              <option value="US$" ${e.currency==='US$'?'selected':''}>US$ USD</option>
            </select>
          </div>
          <div><label>Valid Until</label><input type="date" data-bind="project.validUntil" value="${escHtml(e.project.validUntil)}"></div>
          <div><label>HST Rate (%)</label><input type="number" step="0.01" data-bind="taxRate" value="${e.taxRate}"></div>
        </div>

        <h3 style="font-family:'Instrument Serif',serif;font-size:18px;margin:22px 0 10px;color:var(--accent-deep);font-style:italic;">Line Items</h3>

        <div class="items-head">
          <label>Description</label>
          <label>Qty</label>
          <label>Rate</label>
          <label style="text-align:right;">Amount</label>
          <span></span>
        </div>

        <div id="items-wrap"></div>

        <button class="btn-add" id="add-item">+ Add line item</button>

        <div class="totals">
          <div class="totals-box">
            <div class="total-row"><span>Subtotal</span><span>${fmt(t.sub, e.currency)}</span></div>
            <div class="total-row"><span>${e.taxLabel} (${Number(e.taxRate).toFixed(2)}%)</span><span>${fmt(t.tax, e.currency)}</span></div>
            <div class="total-row grand"><span>Total</span><span>${fmt(t.total, e.currency)}</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Terms & Conditions</h2>
          <span class="card-num gold">04 / 05</span>
        </div>
        <p class="hint">Pre-filled with electrical contractor and payment terms. Edit or remove anything that doesn't apply to this job.</p>

        <div class="terms-group">
          <div class="terms-group-head">
            <h3>Electrical Service Terms</h3>
          </div>
          <ul class="terms-list terms-list-electrical" id="electrical-terms-list"></ul>
          <button class="btn-add" data-add-term="electrical">+ Add electrical term</button>
        </div>

        <div class="terms-group">
          <div class="terms-group-head">
            <h3>Payment Terms</h3>
          </div>
          <ul class="terms-list terms-list-payment" id="payment-terms-list"></ul>
          <button class="btn-add" data-add-term="payment">+ Add payment term</button>
        </div>

        <div class="terms-group">
          <div class="terms-group-head">
            <h3>Lien Conditions <span style="font-size:11px;color:var(--ink-muted);font-style:normal;font-family:'Geist Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-left:8px;">Construction Act (Ontario)</span></h3>
          </div>
          <ul class="terms-list terms-list-lien" id="lien-terms-list"></ul>
          <button class="btn-add" data-add-term="lien">+ Add lien condition</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Notes for Customer</h2>
          <span class="card-num">05 / 05</span>
        </div>
        <textarea data-bind="notes" placeholder="Anything else the customer should know — proposed start dates, brand preferences, special considerations.">${escHtml(e.notes)}</textarea>
      </div>

      <div class="actions">
        <div>
          ${e.id ? `<button class="btn btn-ghost" id="reset-btn">+ New Estimate</button>` : ''}
        </div>
        <div class="actions-right">
          ${e.id ? `<button class="btn btn-warn" id="delete-btn">Delete</button>` : ''}
          ${e.id ? `<button class="btn btn-ghost" id="print-btn">Print / PDF</button>` : ''}
          ${!isShared
            ? `<button class="btn btn-gold" id="share-btn">⚡ ${e.id ? 'Save & Send' : 'Save & Generate ID'}</button>`
            : `<button class="btn btn-primary" id="share-btn">Save Changes</button>`}
        </div>
      </div>
    `;

    renderItems();
    renderTermsLists();
    bindInputs();

    document.getElementById('add-item').addEventListener('click', () => {
      e.items.push({ id: uid(), desc: '', qty: 1, rate: 0 });
      renderItems(); renderTotals();
    });
    document.querySelectorAll('[data-add-term]').forEach(b => {
      b.addEventListener('click', () => {
        const grp = b.dataset.addTerm;
        if (grp === 'electrical') e.electricalTerms.push('');
        else if (grp === 'payment') e.paymentTerms.push('');
        else if (grp === 'lien') e.lienTerms.push('');
        renderTermsLists();
      });
    });
    document.getElementById('share-btn').addEventListener('click', shareCurrent);
    if (document.getElementById('reset-btn')) {
      document.getElementById('reset-btn').addEventListener('click', () => {
        activeEstimate = newDraft();
        render();
      });
    }
    if (document.getElementById('delete-btn')) {
      document.getElementById('delete-btn').addEventListener('click', async () => {
        if (!confirm('Delete this estimate permanently?')) return;
        await deleteEstimate(e.id);
        activeEstimate = newDraft();
        toast('Estimate deleted');
        render();
      });
    }
    if (document.getElementById('print-btn')) {
      document.getElementById('print-btn').addEventListener('click', () => setView('print'));
    }
    if (document.getElementById('copy-id')) {
      document.getElementById('copy-id').addEventListener('click', () => {
        navigator.clipboard?.writeText(e.id);
        toast('ID copied');
      });
    }
  }

  function renderItems() {
    const e = activeEstimate;
    const wrap = document.getElementById('items-wrap');
    if (!wrap) return;
    wrap.innerHTML = e.items.map((it, idx) => {
      const amt = (Number(it.qty) || 0) * (Number(it.rate) || 0);
      return `
        <div class="item-row" data-idx="${idx}">
          <input type="text" data-item="desc" value="${escHtml(it.desc)}" placeholder="Description of work">
          <input type="number" step="0.01" data-item="qty" value="${it.qty}">
          <input type="number" step="0.01" data-item="rate" value="${it.rate}">
          <div class="amount-cell">${fmt(amt, e.currency)}</div>
          <button class="icon-btn" data-rm="${idx}" title="Remove">×</button>
        </div>
      `;
    }).join('');

    wrap.querySelectorAll('input[data-item]').forEach(input => {
      input.addEventListener('input', ev => {
        const row = ev.target.closest('.item-row');
        const idx = Number(row.dataset.idx);
        const field = ev.target.dataset.item;
        const v = ev.target.value;
        e.items[idx][field] = (field === 'qty' || field === 'rate') ? Number(v) : v;
        renderItems();
        renderTotals();
        const same = wrap.querySelector(`.item-row[data-idx="${idx}"] input[data-item="${field}"]`);
        if (same) {
          same.focus();
          if (same.type !== 'number') {
            const len = same.value.length;
            same.setSelectionRange(len, len);
          }
        }
      });
    });

    wrap.querySelectorAll('[data-rm]').forEach(b => {
      b.addEventListener('click', () => {
        const idx = Number(b.dataset.rm);
        if (e.items.length === 1) {
          e.items = [{ id: uid(), desc: '', qty: 1, rate: 0 }];
        } else {
          e.items.splice(idx, 1);
        }
        renderItems(); renderTotals();
      });
    });
  }

  function renderTotals() {
    const e = activeEstimate;
    const t = calcTotals(e);
    const totalsBox = document.querySelector('.totals-box');
    if (!totalsBox) return;
    totalsBox.innerHTML = `
      <div class="total-row"><span>Subtotal</span><span>${fmt(t.sub, e.currency)}</span></div>
      <div class="total-row"><span>${e.taxLabel} (${Number(e.taxRate).toFixed(2)}%)</span><span>${fmt(t.tax, e.currency)}</span></div>
      <div class="total-row grand"><span>Total</span><span>${fmt(t.total, e.currency)}</span></div>
    `;
  }

  function renderTermsLists() {
    renderTermsList('electrical', activeEstimate.electricalTerms, 'electrical-terms-list');
    renderTermsList('payment', activeEstimate.paymentTerms, 'payment-terms-list');
    renderTermsList('lien', activeEstimate.lienTerms, 'lien-terms-list');
  }

  function renderTermsList(group, arr, listId) {
    const list = document.getElementById(listId);
    if (!list) return;
    list.innerHTML = arr.map((tx, idx) => `
      <li class="term-row">
        <span class="term-num"></span>
        <textarea data-term-grp="${group}" data-term-idx="${idx}" rows="1">${escHtml(tx)}</textarea>
        <button class="icon-btn" data-rm-term-grp="${group}" data-rm-term-idx="${idx}" title="Remove">×</button>
      </li>
    `).join('');

    list.querySelectorAll('textarea[data-term-grp]').forEach(ta => {
      ta.addEventListener('input', ev => {
        const idx = Number(ev.target.dataset.termIdx);
        const grp = ev.target.dataset.termGrp;
        if (grp === 'electrical') activeEstimate.electricalTerms[idx] = ev.target.value;
        else if (grp === 'payment') activeEstimate.paymentTerms[idx] = ev.target.value;
        else if (grp === 'lien') activeEstimate.lienTerms[idx] = ev.target.value;
      });
    });
    list.querySelectorAll('[data-rm-term-grp]').forEach(b => {
      b.addEventListener('click', () => {
        const idx = Number(b.dataset.rmTermIdx);
        const grp = b.dataset.rmTermGrp;
        if (grp === 'electrical') activeEstimate.electricalTerms.splice(idx, 1);
        else if (grp === 'payment') activeEstimate.paymentTerms.splice(idx, 1);
        else if (grp === 'lien') activeEstimate.lienTerms.splice(idx, 1);
        renderTermsLists();
      });
    });
  }

  function bindInputs() {
    document.querySelectorAll('[data-bind]').forEach(el => {
      el.addEventListener('input', ev => {
        const path = ev.target.dataset.bind.split('.');
        let obj = activeEstimate;
        for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
        let val = ev.target.value;
        if (ev.target.type === 'number') val = Number(val);
        obj[path[path.length - 1]] = val;
        if (path[0] === 'taxRate') renderTotals();
      });
    });
  }

  async function shareCurrent() {
    const e = activeEstimate;
    if (!e.customer.name && !e.project.title) {
      toast('Add a customer name or project title first', true);
      return;
    }
    if (!e.id) {
      e.id = makeShareId();
      e.status = 'sent';
    } else if (e.status === 'draft') {
      e.status = 'sent';
    }
    const ok = await saveEstimate(e);
    if (ok) {
      toast('Saved — ID: ' + e.id);
      render();
    }
  }

  async function renderList() {
    const root = document.getElementById('view-root');
    root.innerHTML = `<div class="card"><div class="card-header"><h2 class="card-title">My Estimates</h2><span class="card-num">Saved</span></div><div id="list-body"><div class="empty"><div class="icon">⚡</div><p>Loading…</p></div></div></div>`;
    const all = await listEstimates();
    const body = document.getElementById('list-body');
    if (all.length === 0) {
      body.innerHTML = `<div class="empty"><div class="icon">⚡</div><h3>No estimates yet</h3><p>Click <strong>Create</strong> to draft your first estimate.</p></div>`;
      return;
    }
    body.innerHTML = `<div class="estimate-list">${all.map(e => {
      const t = calcTotals(e);
      const s = statusOf(e);
      return `
        <div class="estimate-item" data-open="${e.id}">
          <div class="est-meta-left">
            <div class="est-id">${e.id}</div>
            <div class="est-customer">${escHtml(e.customer.name || '—')} · ${escHtml(e.project.title || 'Untitled')}</div>
          </div>
          <div class="est-meta-right">
            <span class="est-amount">${fmt(t.total, e.currency)}</span>
            <span class="status-pill status-${s}">${statusLabel(s)}</span>
          </div>
        </div>
      `;
    }).join('')}</div>`;

    body.querySelectorAll('[data-open]').forEach(el => {
      el.addEventListener('click', async () => {
        const id = el.dataset.open;
        activeEstimate = await loadEstimate(id);
        if (activeEstimate) setView('create');
      });
    });
  }

  function renderCustomer() {
    const root = document.getElementById('view-root');

    if (!customerLookupId) {
      root.innerHTML = `
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Review Your Estimate</h2>
            <span class="card-num">Customer</span>
          </div>
          <p style="color:var(--ink-soft);margin:0 0 16px;font-size:14px;">Enter the estimate ID provided by JH Electrical Services.</p>
          <div class="id-lookup">
            <input type="text" id="lookup-input" placeholder="EST-XXXXXX" maxlength="10" autocomplete="off">
            <button class="btn btn-gold" id="lookup-btn">Open</button>
          </div>
        </div>
      `;
      const inp = document.getElementById('lookup-input');
      const go = async () => {
        const id = inp.value.trim().toUpperCase();
        if (!id) return;
        const est = await loadEstimate(id);
        if (!est) { toast('No estimate found for ID ' + id, true); return; }
        customerLookupId = id;
        activeEstimate = est;
        pendingResponse = est.customerResponse ? JSON.parse(JSON.stringify(est.customerResponse)) : { decisions: {}, notes: {}, customerName: '', signedAt: null, overallNote: '' };
        est.items.forEach(it => {
          if (!(it.id in pendingResponse.decisions)) pendingResponse.decisions[it.id] = '';
          if (!(it.id in pendingResponse.notes)) pendingResponse.notes[it.id] = '';
        });
        renderCustomer();
      };
      document.getElementById('lookup-btn').addEventListener('click', go);
      inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') go(); });
      inp.focus();
      return;
    }

    const e = activeEstimate;
    const t = calcTotals(e);
    const submitted = !!(e.customerResponse && e.customerResponse.signedAt);

    const acceptedTotal = e.items.reduce((s, it) => {
      return pendingResponse.decisions[it.id] === 'accept'
        ? s + (Number(it.qty) || 0) * (Number(it.rate) || 0)
        : s;
    }, 0);
    const acceptedTax = acceptedTotal * ((Number(e.taxRate) || 0) / 100);

    root.innerHTML = `
      <div class="customer-letterhead">
        <div class="letterhead-left">
          <img class="letterhead-logo" src="${LOGO_URI}" alt="JH Electrical Services">
          <div>
            <div class="letterhead-name">${escHtml(e.business.name)}</div>
            <div class="letterhead-contact">
              ${escHtml(e.business.address || '')}<br>
              ${escHtml(e.business.phone || '')} · ${escHtml(e.business.email || '')}<br>
              ${escHtml(e.business.website || '')} · ${escHtml(e.business.license || '')}
            </div>
          </div>
        </div>
        <div class="letterhead-right">
          <div class="letterhead-est-id">${e.id}</div>
          ${e.project.validUntil ? `Valid until ${escHtml(e.project.validUntil)}` : ''}
        </div>
      </div>

      ${submitted ? `
        <div class="response-summary">
          <h4>You've already responded to this estimate</h4>
          <p>Signed by <strong>${escHtml(e.customerResponse.customerName)}</strong> on ${new Date(e.customerResponse.signedAt).toLocaleString()}.</p>
          <p>Your previous decisions are shown below. Submitting again will overwrite your earlier response.</p>
        </div>` : ''}

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">${escHtml(e.project.title || 'Estimate')}</h2>
          <span class="card-num">For Your Review</span>
        </div>

        <div class="row row-2">
          <div class="read-only-block"><strong>Prepared For</strong>${escHtml(e.customer.name || '—')}<br>${escHtml(e.customer.email || '')}<br>${escHtml(e.customer.phone || '')}</div>
          <div class="read-only-block"><strong>Site Address</strong>${escHtml(e.customer.address || '—')}</div>
        </div>

        ${e.project.description ? `<div class="read-only-block"><strong>Project Overview</strong>${escHtml(e.project.description)}</div>` : ''}
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Review Each Line</h2>
          <span class="card-num gold">Accept or Reject</span>
        </div>
        <p class="hint">Tap Accept or Reject for each item. You can accept some and reject others.</p>
        <div id="review-items"></div>

        <div class="totals">
          <div class="totals-box">
            <div class="total-row"><span>Original Total</span><span>${fmt(t.total, e.currency)}</span></div>
            <div class="total-row" style="color:var(--accent-deep);"><span>Items you accepted</span><span>${fmt(acceptedTotal, e.currency)}</span></div>
            <div class="total-row"><span>${e.taxLabel} on accepted</span><span>${fmt(acceptedTax, e.currency)}</span></div>
            <div class="total-row grand"><span>Your Accepted Total</span><span>${fmt(acceptedTotal + acceptedTax, e.currency)}</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Terms & Conditions</h2>
          <span class="card-num">Please Read</span>
        </div>

        ${(e.electricalTerms || []).filter(x => x && x.trim()).length ? `
          <div class="terms-group">
            <div class="terms-group-head"><h3>Electrical Service Terms</h3></div>
            <ul class="terms-list terms-list-electrical">
              ${e.electricalTerms.filter(x => x && x.trim()).map(tx => `<li class="term-row"><span class="term-num"></span><div class="read-text">${escHtml(tx)}</div></li>`).join('')}
            </ul>
          </div>` : ''}

        ${(e.paymentTerms || []).filter(x => x && x.trim()).length ? `
          <div class="terms-group">
            <div class="terms-group-head"><h3>Payment Terms</h3></div>
            <ul class="terms-list terms-list-payment">
              ${e.paymentTerms.filter(x => x && x.trim()).map(tx => `<li class="term-row"><span class="term-num"></span><div class="read-text">${escHtml(tx)}</div></li>`).join('')}
            </ul>
          </div>` : ''}

        ${(e.lienTerms || []).filter(x => x && x.trim()).length ? `
          <div class="terms-group">
            <div class="terms-group-head"><h3>Lien Conditions <span style="font-size:11px;color:var(--ink-muted);font-style:normal;font-family:'Geist Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-left:8px;">Construction Act (Ontario)</span></h3></div>
            <ul class="terms-list terms-list-lien">
              ${e.lienTerms.filter(x => x && x.trim()).map(tx => `<li class="term-row"><span class="term-num"></span><div class="read-text">${escHtml(tx)}</div></li>`).join('')}
            </ul>
          </div>` : ''}

        ${e.notes ? `<div class="read-only-block" style="margin-top:14px;"><strong>Additional Notes</strong>${escHtml(e.notes)}</div>` : ''}
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Sign & Submit</h2>
          <span class="card-num gold">Final Step</span>
        </div>
        <div class="row">
          <div><label>Overall comment (optional)</label><textarea id="overall-note" placeholder="Anything you'd like to add for JH Electrical Services.">${escHtml(pendingResponse.overallNote || '')}</textarea></div>
        </div>
        <div class="signature-box">
          <label>Type your full name to sign</label>
          <input type="text" id="customer-sign" value="${escHtml(pendingResponse.customerName || '')}" placeholder="Your full name">
          <p class="hint" style="margin-top:8px;">By typing your name and submitting, you confirm your responses to each line item above and acknowledge the Terms & Conditions.</p>
        </div>
        <div class="submit-resp">
          <button class="btn btn-ghost" id="back-btn" style="margin-right:8px;">Back</button>
          <button class="btn btn-gold" id="submit-resp">⚡ Submit Response</button>
        </div>
      </div>
    `;

    renderReviewItems();

    document.getElementById('overall-note').addEventListener('input', ev => pendingResponse.overallNote = ev.target.value);
    document.getElementById('customer-sign').addEventListener('input', ev => pendingResponse.customerName = ev.target.value);
    document.getElementById('back-btn').addEventListener('click', () => {
      customerLookupId = '';
      activeEstimate = null;
      pendingResponse = null;
      renderCustomer();
    });
    document.getElementById('submit-resp').addEventListener('click', submitCustomerResponse);
  }

  function renderReviewItems() {
    const e = activeEstimate;
    const wrap = document.getElementById('review-items');
    if (!wrap) return;
    wrap.innerHTML = e.items.map(it => {
      const amt = (Number(it.qty) || 0) * (Number(it.rate) || 0);
      const dec = pendingResponse.decisions[it.id] || '';
      const note = pendingResponse.notes[it.id] || '';
      return `
        <div class="review-item ${dec === 'accept' ? 'accepted' : dec === 'reject' ? 'rejected' : ''}" data-iid="${it.id}">
          <div class="review-item-top">
            <div>
              <div class="review-item-desc">${escHtml(it.desc || '—')}</div>
              <div class="review-item-meta">${it.qty} × ${fmt(it.rate, e.currency)}</div>
            </div>
            <div class="review-item-amt">${fmt(amt, e.currency)}</div>
          </div>
          <div class="accept-toggle">
            <button class="toggle-btn ${dec === 'accept' ? 'active-accept' : ''}" data-decide="accept">✓ Accept</button>
            <button class="toggle-btn ${dec === 'reject' ? 'active-reject' : ''}" data-decide="reject">✕ Reject</button>
          </div>
          ${dec === 'reject' ? `
            <div class="reject-reason">
              <input type="text" data-note placeholder="Reason (optional)" value="${escHtml(note)}">
            </div>` : ''}
        </div>
      `;
    }).join('');

    wrap.querySelectorAll('.review-item').forEach(box => {
      const iid = box.dataset.iid;
      box.querySelectorAll('[data-decide]').forEach(btn => {
        btn.addEventListener('click', () => {
          pendingResponse.decisions[iid] = btn.dataset.decide;
          renderReviewItems();
          renderCustomerTotals();
        });
      });
      const noteInput = box.querySelector('[data-note]');
      if (noteInput) noteInput.addEventListener('input', ev => pendingResponse.notes[iid] = ev.target.value);
    });
  }

  function renderCustomerTotals() {
    const e = activeEstimate;
    const t = calcTotals(e);
    const acceptedTotal = e.items.reduce((s, it) => {
      return pendingResponse.decisions[it.id] === 'accept'
        ? s + (Number(it.qty) || 0) * (Number(it.rate) || 0)
        : s;
    }, 0);
    const acceptedTax = acceptedTotal * ((Number(e.taxRate) || 0) / 100);
    const box = document.querySelector('.totals-box');
    if (!box) return;
    box.innerHTML = `
      <div class="total-row"><span>Original Total</span><span>${fmt(t.total, e.currency)}</span></div>
      <div class="total-row" style="color:var(--accent-deep);"><span>Items you accepted</span><span>${fmt(acceptedTotal, e.currency)}</span></div>
      <div class="total-row"><span>${e.taxLabel} on accepted</span><span>${fmt(acceptedTax, e.currency)}</span></div>
      <div class="total-row grand"><span>Your Accepted Total</span><span>${fmt(acceptedTotal + acceptedTax, e.currency)}</span></div>
    `;
  }

  async function submitCustomerResponse() {
    if (!pendingResponse.customerName.trim()) {
      toast('Please type your name to sign', true);
      return;
    }
    const undecided = activeEstimate.items.filter(it => !pendingResponse.decisions[it.id]);
    if (undecided.length > 0) {
      if (!confirm(`${undecided.length} item(s) have no decision yet. Submit anyway?`)) return;
    }
    pendingResponse.signedAt = new Date().toISOString();
    activeEstimate.customerResponse = pendingResponse;
    const ok = await saveEstimate(activeEstimate);
    if (ok) {
      toast('Response submitted — thank you!');
      setTimeout(() => {
        customerLookupId = '';
        activeEstimate = null;
        pendingResponse = null;
        setView('customer');
      }, 1200);
    }
  }

  // ===================== Render: Print / PDF =====================
  function renderPrint() {
    const root = document.getElementById('view-root');
    const e = activeEstimate;

    if (!e) {
      root.innerHTML = `
        <div class="card">
          <div class="card-header"><h2 class="card-title">Print Estimate</h2><span class="card-num">PDF</span></div>
          <div class="empty">
            <div class="icon">⚡</div>
            <h3>No estimate loaded</h3>
            <p>Open one from <strong>My Estimates</strong> or create a new one first.</p>
          </div>
        </div>`;
      return;
    }

    const t = calcTotals(e);

    root.innerHTML = `
      <div class="print-toolbar">
        <p><strong>Print Preview.</strong> Use your browser's <em>Save as PDF</em> to email this to your customer. They sign the line items and return.</p>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" id="back-to-edit">Back to Edit</button>
          <button class="btn btn-gold" id="do-print">⚡ Print / Save as PDF</button>
        </div>
      </div>

      <div class="print-sheet">
        <div class="ph-head">
          <div class="ph-head-left">
            <img src="${LOGO_URI}" alt="JH Electrical Services">
            <div>
              <div class="ph-co-name">${escHtml(e.business.name || '')}</div>
              <div class="ph-co-contact">
                ${escHtml(e.business.address || '')}<br>
                ${escHtml(e.business.phone || '')} &nbsp;·&nbsp; ${escHtml(e.business.email || '')}<br>
                ${escHtml(e.business.website || '')} &nbsp;·&nbsp; ${escHtml(e.business.license || '')}
              </div>
            </div>
          </div>
          <div class="ph-head-right">
            <div class="ph-est-title">ESTIMATE</div>
            <div class="ph-est-id">${e.id || 'DRAFT'}</div>
            <div style="margin-top:6px;">Issued: ${new Date(e.createdAt).toLocaleDateString('en-CA')}</div>
            ${e.project.validUntil ? `<div>Valid until: ${escHtml(e.project.validUntil)}</div>` : ''}
          </div>
        </div>

        <div class="ph-section">
          <div class="ph-bill-grid">
            <div>
              <h4>Prepared For</h4>
              <strong>${escHtml(e.customer.name || '—')}</strong><br>
              ${e.customer.email ? escHtml(e.customer.email) + '<br>' : ''}
              ${e.customer.phone ? escHtml(e.customer.phone) + '<br>' : ''}
            </div>
            <div>
              <h4>Site Address</h4>
              ${escHtml(e.customer.address || '—')}
            </div>
          </div>
        </div>

        ${e.project.title || e.project.description ? `
          <div class="ph-section">
            <h4>Scope of Work</h4>
            ${e.project.title ? `<strong>${escHtml(e.project.title)}</strong><br>` : ''}
            ${e.project.description ? escHtml(e.project.description).replace(/\n/g, '<br>') : ''}
          </div>` : ''}

        <div class="ph-section">
          <h4>Line Items</h4>
          <table class="ph-items">
            <thead>
              <tr>
                <th style="width:50%;">Description</th>
                <th class="num" style="width:10%;">Qty</th>
                <th class="num" style="width:15%;">Rate</th>
                <th class="num" style="width:15%;">Amount</th>
                <th class="center" style="width:10%;">Customer</th>
              </tr>
            </thead>
            <tbody>
              ${e.items.map(it => {
                const amt = (Number(it.qty) || 0) * (Number(it.rate) || 0);
                return `
                  <tr>
                    <td>${escHtml(it.desc || '—')}</td>
                    <td class="num">${it.qty}</td>
                    <td class="num">${fmt(it.rate, e.currency)}</td>
                    <td class="num">${fmt(amt, e.currency)}</td>
                    <td>
                      <div class="ph-accept-cell">
                        <span class="ph-checkbox"><span class="ph-box"></span> Accept</span>
                        <span class="ph-checkbox"><span class="ph-box"></span> Reject</span>
                      </div>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>

          <div class="ph-totals">
            <div class="ph-totals-box">
              <div class="ph-totals-row"><span>Subtotal</span><span>${fmt(t.sub, e.currency)}</span></div>
              <div class="ph-totals-row"><span>${e.taxLabel} (${Number(e.taxRate).toFixed(2)}%)</span><span>${fmt(t.tax, e.currency)}</span></div>
              <div class="ph-totals-row grand"><span>TOTAL</span><span>${fmt(t.total, e.currency)}</span></div>
            </div>
          </div>
        </div>

        ${e.notes ? `
          <div class="ph-notes-block">
            <strong>Notes</strong>
            ${escHtml(e.notes).replace(/\n/g, '<br>')}
          </div>` : ''}

        <div class="ph-terms-section">
          <h4 style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-deep);margin:18px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--rule);font-weight:600;">Terms & Conditions</h4>

          ${(e.electricalTerms || []).filter(x => x && x.trim()).length ? `
            <h5>Electrical Service Terms</h5>
            <ol>${e.electricalTerms.filter(x => x && x.trim()).map(tx => `<li>${escHtml(tx)}</li>`).join('')}</ol>` : ''}

          ${(e.paymentTerms || []).filter(x => x && x.trim()).length ? `
            <h5>Payment Terms</h5>
            <ol>${e.paymentTerms.filter(x => x && x.trim()).map(tx => `<li>${escHtml(tx)}</li>`).join('')}</ol>` : ''}

          ${(e.lienTerms || []).filter(x => x && x.trim()).length ? `
            <h5>Lien Conditions — Construction Act (Ontario)</h5>
            <ol>${e.lienTerms.filter(x => x && x.trim()).map(tx => `<li>${escHtml(tx)}</li>`).join('')}</ol>` : ''}
        </div>

        <div class="ph-signatures">
          <div>
            <div class="ph-sig-line"></div>
            <div class="ph-sig-block">Customer Signature</div>
            <div class="ph-sig-row">
              <div>
                <div class="ph-sig-line"></div>
                <div class="ph-sig-block">Print Name</div>
              </div>
              <div>
                <div class="ph-sig-line"></div>
                <div class="ph-sig-block">Date</div>
              </div>
            </div>
          </div>
          <div>
            <div class="ph-sig-line"></div>
            <div class="ph-sig-block">JH Electrical Services Inc.</div>
            <div class="ph-sig-row">
              <div>
                <div class="ph-sig-line"></div>
                <div class="ph-sig-block">Print Name</div>
              </div>
              <div>
                <div class="ph-sig-line"></div>
                <div class="ph-sig-block">Date</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('back-to-edit').addEventListener('click', () => setView('create'));
    document.getElementById('do-print').addEventListener('click', () => window.print());
  }

  function render() {
    if (currentView === 'create') renderCreate();
    else if (currentView === 'list') renderList();
    else if (currentView === 'print') renderPrint();
    else renderCustomer();
  }

  render();
</script>
